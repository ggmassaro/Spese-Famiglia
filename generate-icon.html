<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Generatore icona - Spese Famiglia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #0d0d14;
    color: #f2f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px;
  }
  canvas {
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }
  .azioni {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #7b5cff, #e85fb0, #ff9a5a);
    color: #ffffff;
  }
</style>
</head>
<body>
  <h1>Generatore icona app</h1>
  <p>Strumento usa e getta: apri questa pagina nel browser, scarica le due immagini e salvale nella cartella <code>icons/</code> del progetto.</p>

  <canvas id="icona-canvas" width="512" height="512"></canvas>

  <div class="azioni">
    <button type="button" id="scarica-512">Scarica PNG 512x512</button>
    <button type="button" id="scarica-192">Scarica PNG 192x192</button>
  </div>

  <script>
    const canvas = document.getElementById("icona-canvas");
    const ctx = canvas.getContext("2d");

    function poligonoArrotondato(contesto, punti, raggio) {
      const ultimo = punti[punti.length - 1];
      const primo = punti[0];
      contesto.beginPath();
      contesto.moveTo((ultimo[0] + primo[0]) / 2, (ultimo[1] + primo[1]) / 2);
      for (let i = 0; i < punti.length; i++) {
        const corrente = punti[i];
        const successivo = punti[(i + 1) % punti.length];
        contesto.arcTo(corrente[0], corrente[1], successivo[0], successivo[1], raggio);
      }
      contesto.closePath();
    }

    function disegnaPersona(centroX, centroYTesta, raggioTesta, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#ffffff";

      // Testa
      ctx.beginPath();
      ctx.arc(centroX, centroYTesta, raggioTesta, 0, Math.PI * 2);
      ctx.fill();

      // Corpo: trapezoide arrotondato che si allarga verso il basso
      const spallaY = centroYTesta + raggioTesta * 0.7;
      const bodyBottomY = spallaY + raggioTesta * 3.3;
      const metaLarghezzaAlto = raggioTesta * 1.0;
      const metaLarghezzaBasso = raggioTesta * 1.7;
      const raggioAngoli = raggioTesta * 0.5;

      const punti = [
        [centroX - metaLarghezzaAlto, spallaY],
        [centroX + metaLarghezzaAlto, spallaY],
        [centroX + metaLarghezzaBasso, bodyBottomY],
        [centroX - metaLarghezzaBasso, bodyBottomY],
      ];

      poligonoArrotondato(ctx, punti, raggioAngoli);
      ctx.fill();

      ctx.restore();
    }

    function disegnaIcona() {
      const gradiente = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradiente.addColorStop(0, "#7b5cff");
      gradiente.addColorStop(0.5, "#e85fb0");
      gradiente.addColorStop(1, "#ff9a5a");
      ctx.fillStyle = gradiente;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Adulto sinistro e adulto destro (simmetrici, stessa dimensione)
      disegnaPersona(140, 190, 70, 1);
      disegnaPersona(372, 190, 70, 1);

      // Figura centrale piu piccola, in primo piano (disegnata per ultima, leggermente trasparente)
      disegnaPersona(256, 250, 50, 0.92);
    }

    function scaricaPng(dimensione, nomeFile) {
      const canvasEsportazione = document.createElement("canvas");
      canvasEsportazione.width = dimensione;
      canvasEsportazione.height = dimensione;
      canvasEsportazione.getContext("2d").drawImage(canvas, 0, 0, dimensione, dimensione);

      const link = document.createElement("a");
      link.href = canvasEsportazione.toDataURL("image/png");
      link.download = nomeFile;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    disegnaIcona();

    document.getElementById("scarica-512").addEventListener("click", () => scaricaPng(512, "icon-512.png"));
    document.getElementById("scarica-192").addEventListener("click", () => scaricaPng(192, "icon-192.png"));
  </script>
</body>
</html>
