<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spese Famiglia</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Stili personalizzati -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Schermata di login -->
  <div id="login-screen" class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm" style="width: 100%; max-width: 360px;">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">Accedi</h2>
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="login-email" placeholder="nome@esempio.it">
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password" placeholder="Password">
        </div>
        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
        <button type="button" id="login-button" class="btn btn-primary w-100">Accedi</button>
      </div>
    </div>
  </div>

  <div id="app-container" class="container py-4 d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="mb-0">Spese Famiglia</h1>
      <div class="d-flex align-items-center gap-3">
        <span id="user-email" class="text-muted small"></span>
        <button type="button" id="logout-button" class="btn btn-outline-secondary btn-sm">Esci</button>
      </div>
    </div>

    <!-- Navigazione a tab -->
    <ul class="nav nav-tabs" id="mainTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="inserisci-tab" data-bs-toggle="tab" data-bs-target="#inserisci-pane" type="button" role="tab" aria-controls="inserisci-pane" aria-selected="true">
          Inserisci Spesa
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard-pane" type="button" role="tab" aria-controls="dashboard-pane" aria-selected="false">
          Dashboard
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="budget-tab" data-bs-toggle="tab" data-bs-target="#budget-pane" type="button" role="tab" aria-controls="budget-pane" aria-selected="false">
          Budget
        </button>
      </li>
    </ul>

    <!-- Contenuto tab -->
    <div class="tab-content border border-top-0 p-3" id="mainTabContent">
      <div class="tab-pane fade show active" id="inserisci-pane" role="tabpanel" aria-labelledby="inserisci-tab" tabindex="0">
        <form id="spesa-form" class="mt-3" novalidate>
          <div class="row g-3">
            <div class="col-6 col-md-3">
              <label for="spesa-data" class="form-label">Data</label>
              <input type="date" class="form-control" id="spesa-data" required>
            </div>
            <div class="col-6 col-md-3">
              <label for="spesa-importo" class="form-label">Importo (&euro;)</label>
              <input type="number" class="form-control" id="spesa-importo" step="0.01" min="0" required>
            </div>
            <div class="col-6 col-md-3">
              <label for="spesa-voce" class="form-label">Voce spesa</label>
              <select class="form-select" id="spesa-voce" required></select>
            </div>
            <div class="col-6 col-md-3">
              <label for="spesa-gruppo" class="form-label">Gruppo spesa</label>
              <select class="form-select" id="spesa-gruppo" required></select>
            </div>
            <div class="col-6 col-md-3">
              <label for="spesa-metodo" class="form-label">Metodo pagamento</label>
              <select class="form-select" id="spesa-metodo" required>
                <option value="Contanti">Contanti</option>
                <option value="Carta">Carta</option>
              </select>
            </div>
            <div class="col-12 col-md-9">
              <label for="spesa-nota" class="form-label">Nota</label>
              <input type="text" class="form-control" id="spesa-nota" placeholder="Facoltativa">
            </div>
          </div>

          <div id="spesa-feedback" class="alert d-none mt-3" role="alert"></div>

          <div class="mt-3 d-flex gap-2">
            <button type="submit" id="spesa-submit-button" class="btn btn-primary">Salva spesa</button>
            <button type="button" id="annulla-modifica-button" class="btn btn-outline-secondary d-none">Annulla modifica</button>
          </div>
        </form>

        <h5 class="mt-4">Spese recenti</h5>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle">
            <thead>
              <tr>
                <th>Data</th>
                <th>Importo</th>
                <th>Voce spesa</th>
                <th>Gruppo spesa</th>
                <th>Metodo</th>
                <th>Nota</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="spese-table-body"></tbody>
          </table>
        </div>
      </div>
      <div class="tab-pane fade" id="dashboard-pane" role="tabpanel" aria-labelledby="dashboard-tab" tabindex="0">
        <div class="row g-3 align-items-end mt-1">
          <div class="col-6 col-md-3">
            <label for="dashboard-mese-filtro" class="form-label">Mese</label>
            <input type="month" class="form-control" id="dashboard-mese-filtro">
          </div>
          <div class="col-6 col-md-3 ms-md-auto text-md-end">
            <button type="button" id="dashboard-export-csv-button" class="btn btn-outline-primary">Esporta CSV</button>
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-12 col-md-4">
            <div class="card h-100">
              <div class="card-body text-center d-flex flex-column justify-content-center">
                <div class="text-muted">Totale speso nel mese</div>
                <div id="dashboard-totale-mese" class="display-5 fw-bold">&euro;0,00</div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="card h-100">
              <div class="card-body">
                <h6 class="card-title text-center">Per Voce spesa</h6>
                <canvas id="dashboard-chart-voce"></canvas>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="card h-100">
              <div class="card-body">
                <h6 class="card-title text-center">Per Gruppo spesa</h6>
                <canvas id="dashboard-chart-gruppo"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3 mt-1 mb-3">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">Andamento mensile</h6>
                <canvas id="dashboard-chart-trend"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="tab-pane fade" id="budget-pane" role="tabpanel" aria-labelledby="budget-tab" tabindex="0">
        <!-- TODO: gestione budget -->
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Libreria Supabase (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Libreria Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- Supabase config -->
  <script src="js/supabase-config.js"></script>

  <!-- Logica applicativa -->
  <script src="js/app.js"></script>
</body>
</html>
